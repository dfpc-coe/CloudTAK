<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CloudTAK Setup</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #333;
        }
        input {
            width: 100%;
            padding: 0.5rem;
            margin: 1rem 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CloudTAK Setup</h1>
        <p>Enter the URL of your CloudTAK server:</p>
        <input type="url" id="serverUrl" placeholder="https://cloudtak.example.com" required>
        <button id="saveBtn">Connect</button>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        document.getElementById('saveBtn').addEventListener('click', () => {
            const url = document.getElementById('serverUrl').value;
            if (url) {
                ipcRenderer.send('save-url', url);
            } else {
                alert('Please enter a valid URL');
            }
        });

        document.getElementById('serverUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('saveBtn').click();
            }
        });
    </script>
</body>
</html>
